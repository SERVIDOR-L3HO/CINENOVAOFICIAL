<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINENOVA - Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        body { background-color: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .movie-card:hover { transform: translateY(-8px) scale(1.03); }
        .hero-gradient { background: linear-gradient(0deg, #050505 5%, transparent 100%); }
        .glow-red { box-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        .episode-card.active { background: #38bdf8; border-color: transparent; }
        @media (max-width: 768px) {
            .hero-title { font-size: 3.5rem !important; }
            .grid-container { padding: 1rem !important; }
        }

        /* Carousels */
        .carousel-track { scrollbar-width: none; -ms-overflow-style: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        .carousel-card, .search-card, .tv-card { transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); }
        .carousel-card:hover, .search-card:hover, .tv-card:hover { transform: translateY(-8px) scale(1.03); }
        .arrow-btn { transition: all 0.2s ease; }
        .arrow-btn:hover { background: rgba(56,189,248,0.2) !important; border-color: rgba(56,189,248,0.5) !important; transform: scale(1.1); }

        /* Info Modal */
        #info-modal { animation: fadeInModal 0.3s ease; }
        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #info-modal-card { animation: slideUpModal 0.35s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideUpModal {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .info-genre-badge {
            background: rgba(56,189,248,0.12);
            border: 1px solid rgba(56,189,248,0.3);
            color: #38bdf8;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 999px;
        }
        .rating-star { color: #facc15; }
        .info-meta-chip {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cast-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 10px;
            font-weight: 600;
            color: #d1d5db;
            white-space: nowrap;
        }
        .info-poster-shadow { box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05); }
        .shimmer-loader {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    </style>
</head>
<body class="antialiased">
    <nav class="fixed w-full z-[100] glass px-4 md:px-8 py-3 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4 md:gap-10">
            <img src="/assets/cinenova_full_logo.png" alt="CINENOVA" class="h-8 md:h-10 cursor-pointer" onclick="window.location.reload()">
            <div class="hidden lg:flex gap-6 text-[10px] font-black tracking-[3px] uppercase italic">
                <a href="#" class="text-white hover:text-sky-400 transition" onclick="loadCategory('movies')">CINE</a>
                <a href="#" class="text-gray-400 hover:text-sky-400 transition" onclick="loadCategory('series')">SERIES</a>
                <a href="#" class="text-gray-400 hover:text-sky-400 transition" onclick="loadCategory('tv')">VIVO</a>
            </div>
            <div class="flex bg-white/5 rounded-full p-1 border border-white/10">
                <button onclick="setLanguage('es-ES')" id="lang-es" class="px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all bg-sky-400 text-white">ESP</button>
                <button onclick="setLanguage('en-US')" id="lang-en" class="px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all text-gray-400">ENG</button>
            </div>
        </div>
        <div class="flex items-center gap-4 md:gap-6">
            <div class="relative group">
                <input type="text" id="global-search" placeholder="BUSCAR..." class="bg-white/5 border border-white/10 rounded-full px-4 md:px-6 py-1.5 md:py-2 text-[10px] md:text-xs focus:outline-none focus:border-sky-400 w-32 md:w-48 focus:md:w-64 transition-all duration-500 uppercase font-bold">
                <i class="fas fa-search absolute right-4 top-2 md:top-2.5 text-gray-500 group-focus-within:text-sky-400 text-[10px] md:text-xs"></i>
            </div>
            <img src="/assets/cinenova_icon.png" alt="CINENOVA" class="h-6 md:h-8 grayscale hover:grayscale-0 transition duration-500">
        </div>
    </nav>

    <!-- Mobile Bottom Nav -->
    <div class="lg:hidden fixed bottom-0 w-full glass z-[100] flex justify-around py-4 border-t border-white/5">
        <button onclick="loadCategory('movies')" class="text-xs font-black tracking-widest text-white flex flex-col items-center gap-1">
            <i class="fas fa-film"></i> CINE
        </button>
        <button onclick="loadCategory('series')" class="text-xs font-black tracking-widest text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-tv"></i> SERIES
        </button>
        <button onclick="loadCategory('tv')" class="text-xs font-black tracking-widest text-gray-400 flex flex-col items-center gap-1">
            <i class="fas fa-broadcast-tower"></i> VIVO
        </button>
    </div>

    <main id="main-view" class="pb-24 lg:pb-0">
        <!-- Hero Section -->
        <div id="hero" class="relative h-[70vh] md:h-[85vh] w-full flex items-end p-6 md:p-12 overflow-hidden">
            <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 scale-105" style="background-image: url('')"></div>
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="absolute inset-0 hero-gradient"></div>
            
            <div class="relative z-10 max-w-4xl w-full">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-sky-400 text-[8px] md:text-[10px] font-black px-2 py-1 rounded italic uppercase tracking-widest">EXCLUSIVE</span>
                    <span id="hero-rating" class="text-yellow-400 font-black text-xs md:text-sm">⭐ 0.0</span>
                </div>
                <h1 id="hero-title" class="hero-title text-4xl md:text-7xl lg:text-8xl font-black mb-4 md:mb-6 leading-none italic uppercase tracking-tighter drop-shadow-2xl">...</h1>
                <p id="hero-desc" class="text-sm md:text-lg text-gray-200 mb-6 md:mb-10 line-clamp-2 md:line-clamp-3 leading-relaxed opacity-70 max-w-2xl font-light"></p>
                <div class="flex flex-wrap gap-3 md:gap-5">
                    <button id="hero-play-btn" class="flex-1 sm:flex-none bg-sky-400 hover:bg-sky-600 px-6 md:px-12 py-3 md:py-5 rounded-full font-black text-[10px] md:text-xs flex items-center justify-center gap-2 md:gap-3 glow-red transition-all transform hover:scale-105 active:scale-95 tracking-widest">
                        <i class="fas fa-play"></i> REPRODUCIR
                    </button>
                    <button id="hero-info-btn" class="flex-1 sm:flex-none bg-white/5 hover:bg-white/10 px-6 md:px-12 py-3 md:py-5 rounded-full font-black text-[10px] md:text-xs backdrop-blur-xl border border-white/10 transition-all tracking-widest flex items-center justify-center gap-2">
                        <i class="fas fa-info-circle"></i> INFO
                    </button>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Area (Carousels / Search / TV) -->
        <div id="content-area" class="pb-10"></div>
    </main>

    <!-- Info / Synopsis Modal -->
    <div id="info-modal" class="fixed inset-0 z-[150] hidden items-center justify-center p-4 md:p-8" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);">
        <div id="info-modal-card" class="relative w-full max-w-4xl max-h-[92vh] overflow-hidden rounded-2xl md:rounded-3xl flex flex-col" style="background: #0e0e0e; border: 1px solid rgba(255,255,255,0.07);">
            
            <!-- Banner + Close -->
            <div class="relative flex-shrink-0 h-48 md:h-72 overflow-hidden">
                <img id="info-banner" src="" class="w-full h-full object-cover object-top" style="filter: brightness(0.55);">
                <div class="absolute inset-0" style="background: linear-gradient(to bottom, transparent 40%, #0e0e0e 100%);"></div>
                <button onclick="closeInfoModal()" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-full transition-all" style="background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);" onmouseover="this.style.background='#38bdf8'" onmouseout="this.style.background='rgba(0,0,0,0.6)'">
                    <i class="fas fa-times text-sm"></i>
                </button>
                <!-- TMDB Rating Badge on banner -->
                <div id="info-rating-badge" class="absolute top-4 left-4 flex items-center gap-2 px-3 py-1.5 rounded-full" style="background: rgba(0,0,0,0.6); border: 1px solid rgba(250,204,21,0.3);">
                    <span class="rating-star text-sm">★</span>
                    <span id="info-rating-val" class="font-black text-sm text-yellow-400"></span>
                    <span class="text-gray-500 text-[9px] font-bold uppercase tracking-widest">TMDB</span>
                </div>
            </div>

            <!-- Content -->
            <div class="overflow-y-auto flex-grow">
                <div class="flex flex-col md:flex-row gap-6 px-5 md:px-8 pb-8 -mt-16 md:-mt-24 relative z-10">
                    
                    <!-- Poster -->
                    <div class="flex-shrink-0 w-28 md:w-44 self-start">
                        <img id="info-poster" src="" class="w-full rounded-xl md:rounded-2xl info-poster-shadow" style="aspect-ratio:2/3; object-fit:cover;">
                    </div>

                    <!-- Details -->
                    <div class="flex-1 min-w-0 pt-4 md:pt-20">
                        
                        <!-- Genres -->
                        <div id="info-genres" class="flex flex-wrap gap-2 mb-3"></div>

                        <!-- Title -->
                        <h2 id="info-title" class="font-black italic uppercase leading-none tracking-tighter mb-3" style="font-size: clamp(1.5rem, 5vw, 2.8rem);"></h2>

                        <!-- Meta chips -->
                        <div id="info-meta" class="flex flex-wrap gap-2 mb-5"></div>

                        <!-- Synopsis -->
                        <div class="mb-5">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-4 h-0.5 bg-sky-400"></div>
                                <span class="text-[9px] font-black tracking-[3px] uppercase text-gray-500">Sinopsis</span>
                            </div>
                            <p id="info-overview" class="text-gray-300 leading-relaxed" style="font-size: 13px; font-weight: 400;"></p>
                        </div>

                        <!-- Trailer -->
                        <div id="info-trailer-block" class="mb-6 hidden">
                            <div class="flex items-center gap-2 mb-3">
                                <div class="w-4 h-0.5 bg-sky-400"></div>
                                <span class="text-[9px] font-black tracking-[3px] uppercase text-gray-500">Tráiler Oficial</span>
                            </div>
                            <div class="relative w-full rounded-xl overflow-hidden" style="aspect-ratio: 16/9; background: #000;">
                                <iframe id="info-trailer-iframe"
                                    class="absolute inset-0 w-full h-full"
                                    frameborder="0"
                                    allowfullscreen
                                    allow="autoplay; encrypted-media; picture-in-picture"
                                    src="">
                                </iframe>
                            </div>
                        </div>

                        <!-- Director / Creator -->
                        <div id="info-director-block" class="mb-4 hidden">
                            <div class="flex items-center gap-2 mb-1.5">
                                <div class="w-4 h-0.5 bg-sky-400"></div>
                                <span id="info-director-label" class="text-[9px] font-black tracking-[3px] uppercase text-gray-500">Director</span>
                            </div>
                            <p id="info-director" class="text-white font-bold" style="font-size: 13px;"></p>
                        </div>

                        <!-- Cast -->
                        <div id="info-cast-block" class="mb-7 hidden">
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-4 h-0.5 bg-sky-400"></div>
                                <span class="text-[9px] font-black tracking-[3px] uppercase text-gray-500">Reparto</span>
                            </div>
                            <div id="info-cast" class="flex flex-wrap gap-2"></div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex flex-wrap gap-3">
                            <button id="info-play-btn" class="flex items-center gap-3 px-8 py-3.5 rounded-full font-black text-xs tracking-widest uppercase transition-all glow-red hover:scale-105 active:scale-95" style="background: #38bdf8;" onclick="playFromInfoModal()">
                                <i class="fas fa-play"></i> REPRODUCIR AHORA
                            </button>
                            <button onclick="closeInfoModal()" class="flex items-center gap-3 px-8 py-3.5 rounded-full font-black text-xs tracking-widest uppercase transition-all" style="background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);" onmouseover="this.style.background='rgba(255,255,255,0.12)'" onmouseout="this.style.background='rgba(255,255,255,0.07)'">
                                <i class="fas fa-chevron-left"></i> VOLVER
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Player View -->
    <div id="player-view" class="fixed inset-0 z-[200] bg-[#0a0a0a] hidden flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="flex-shrink-0 px-4 py-3 flex justify-between items-center bg-black/80 border-b border-white/10">
            <div class="flex items-center gap-3">
                <img src="/assets/cinenova_icon.png" class="h-7">
                <div>
                    <h3 id="player-title" class="font-black italic uppercase text-sm tracking-tighter truncate max-w-[200px] md:max-w-md">CARGANDO...</h3>
                    <p class="text-[9px] text-sky-300 font-bold tracking-widest uppercase opacity-70">FULL HD • LATINO / CASTELLANO</p>
                </div>
            </div>
            <button onclick="closePlayer()" class="w-9 h-9 flex items-center justify-center bg-white/10 hover:bg-sky-500 rounded-lg transition-all">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Audio Selector -->
        <div id="audio-selector-row" class="flex-shrink-0 px-4 py-3 bg-zinc-950 border-b border-white/5 flex items-center justify-between gap-3 flex-wrap">
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest mr-1">Seleccionar Audio:</span>
                <button id="btn-latino" onclick="setAudioType('latino')"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-sky-400 text-white border-2 border-sky-400">
                    🇲🇽 LATINO <span class="bg-white/20 px-1.5 py-0.5 rounded text-[8px]">HD</span>
                </button>
                <button id="btn-castellano" onclick="setAudioType('castellano')"
                    class="flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-white/5 text-gray-300 border-2 border-white/10 hover:border-sky-400/50">
                    🇪🇸 CASTELLANO <span class="bg-white/10 px-1.5 py-0.5 rounded text-[8px]">HD</span>
                </button>
            </div>
            <button id="toggle-episodes-btn" onclick="toggleEpisodesDrawer()" class="hidden text-[9px] font-black text-sky-300 uppercase tracking-widest bg-white/5 px-3 py-2 rounded-lg border border-sky-400/20 hover:bg-sky-400/10 transition">
                <i class="fas fa-list mr-1"></i> EPISODIOS
            </button>
        </div>

        <!-- Server Tabs -->
        <div class="flex-shrink-0 px-4 py-2 bg-zinc-950 border-b border-white/5">
            <div id="server-tabs" class="flex gap-2 overflow-x-auto pb-1 scrollbar-none">
                <!-- Injected by JS -->
            </div>
        </div>

        <!-- Video iframe -->
        <div class="flex-grow relative bg-black min-h-0">
            <iframe id="video-frame" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
            <div id="player-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-zinc-950">
                <div class="w-14 h-14 border-4 border-sky-400 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-[9px] font-black tracking-[4px] text-gray-500 uppercase">CARGANDO SERVIDOR...</p>
            </div>
        </div>

        <!-- Info bar -->
        <div class="flex-shrink-0 px-4 py-2 bg-zinc-950 border-t border-white/5 flex items-center justify-between text-[9px] text-gray-500 font-bold">
            <span>🎬 Si no carga, cambia de servidor o de audio</span>
            <span class="text-sky-400 uppercase tracking-widest">Full HD 1080p</span>
        </div>

        <!-- Episodes Drawer (series only) -->
        <div id="episodes-drawer" class="hidden flex-shrink-0 bg-zinc-900 border-t border-white/10 max-h-56 flex flex-col">
            <div class="px-4 py-2 border-b border-white/5 flex items-center justify-between">
                <select id="season-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] font-bold outline-none focus:border-sky-400 flex-grow mr-3">
                </select>
                <button onclick="toggleEpisodesDrawer()" class="text-[9px] font-black text-gray-400 hover:text-white transition">✕</button>
            </div>
            <div id="episode-list" class="overflow-y-auto p-3 grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-2">
            </div>
        </div>
    </div>

    <script>
        let currentCategory = 'movies';
        let currentItem = null;
        let currentLang = 'es-ES';
        let currentAudioType = 'latino';
        let currentEmbeds = null;
        let currentSeriesId = null;
        let currentSeason = 1;
        let currentEpisode = 1;

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-es').className = lang === 'es-ES'
                ? 'px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all bg-sky-400 text-white'
                : 'px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all text-gray-400';
            document.getElementById('lang-en').className = lang === 'en-US'
                ? 'px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all bg-sky-400 text-white'
                : 'px-3 py-1 rounded-full text-[8px] font-black tracking-widest transition-all text-gray-400';
            loadCategory(currentCategory);
        }

        function setHeroVisible(visible) {
            document.getElementById('hero').style.display = visible ? '' : 'none';
        }

        function updateNavHighlight(category) {
            document.querySelectorAll('nav a, div.lg\\:hidden button').forEach(el => {
                const text = el.innerText.toLowerCase();
                const match = category === 'movies' ? 'cine' : (category === 'series' ? 'series' : 'vivo');
                if (text.includes(match)) {
                    el.classList.add('text-white'); el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('text-white'); el.classList.add('text-gray-400');
                }
            });
        }

        function loadCategory(cat) {
            currentCategory = cat;
            updateNavHighlight(cat);
            document.getElementById('global-search').value = '';
            if (cat === 'tv') {
                setHeroVisible(false);
                loadTvChannels();
            } else {
                setHeroVisible(true);
                loadAndRenderCategories(cat);
            }
        }

        async function loadAndRenderCategories(category) {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="flex flex-col items-center justify-center py-24 gap-4">
                <div class="w-12 h-12 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[9px] font-black tracking-[4px] text-gray-600 uppercase">Cargando categorías...</p>
            </div>`;
            try {
                const res = await fetch(`/api/${category}/categories?lang=${currentLang}`);
                const categories = await res.json();
                if (categories[0]?.items[0]) updateHero(categories[0].items[0]);
                area.innerHTML = '';
                categories.forEach(cat => {
                    if (cat.items.length > 0) area.appendChild(renderCarousel(cat));
                });
            } catch (err) {
                console.error('Error loading categories:', err);
                area.innerHTML = '<div class="text-center py-20 text-gray-600 font-bold tracking-widest uppercase">Error al cargar contenido</div>';
            }
        }

        function renderCarousel(cat) {
            const section = document.createElement('section');
            section.className = 'mb-10 md:mb-14';
            section.innerHTML = `
                <div class="flex items-center justify-between px-4 md:px-12 mb-4 md:mb-5">
                    <div class="flex items-center gap-3">
                        <div class="h-10 md:h-12 w-1 rounded-full flex-shrink-0" style="background: linear-gradient(to bottom, ${cat.accent}, transparent)"></div>
                        <div>
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="text-[8px] font-black tracking-[3px] uppercase" style="color: ${cat.accent}">${cat.label}</span>
                                <span class="text-[7px] font-black text-gray-600 tracking-widest">• ${cat.items.length} TÍTULOS</span>
                            </div>
                            <h2 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter leading-none">${cat.title}</h2>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button class="arrow-btn w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-full" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);" onclick="scrollCarousel('${cat.id}', -1)">
                            <i class="fas fa-chevron-left" style="font-size:10px"></i>
                        </button>
                        <button class="arrow-btn w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-full" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);" onclick="scrollCarousel('${cat.id}', 1)">
                            <i class="fas fa-chevron-right" style="font-size:10px"></i>
                        </button>
                    </div>
                </div>
                <div class="relative">
                    <div id="carousel-${cat.id}" class="carousel-track flex gap-3 md:gap-4 overflow-x-auto px-4 md:px-12 pb-4">
                        ${cat.items.map((item, i) => renderCarouselCard(item, i, cat.accent, cat.id)).join('')}
                    </div>
                    <div class="absolute left-0 top-0 bottom-4 w-10 md:w-20 pointer-events-none" style="background: linear-gradient(to right, #050505, transparent)"></div>
                    <div class="absolute right-0 top-0 bottom-4 w-10 md:w-20 pointer-events-none" style="background: linear-gradient(to left, #050505, transparent)"></div>
                </div>`;
            section.querySelectorAll('.carousel-card').forEach((card, i) => {
                card.onclick = () => openInfoModal(cat.items[i]);
            });
            return section;
        }

        function renderCarouselCard(item, index, accent, catId) {
            const poster = item.poster || 'https://placehold.co/300x450/111/222?text=N/A';
            const rating = item.rating ? item.rating.toFixed(1) : '—';
            return `
                <div class="carousel-card flex-shrink-0 w-32 md:w-44 cursor-pointer group" data-idx="${index}" data-cat="${catId}">
                    <div class="relative overflow-hidden rounded-xl md:rounded-2xl border border-white/5 shadow-2xl" style="aspect-ratio:2/3">
                        <img src="${poster}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-400"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-400">
                            <div class="w-11 h-11 md:w-13 md:h-13 rounded-full flex items-center justify-center shadow-xl scale-75 group-hover:scale-100 transition-transform duration-400" style="background: ${accent}; box-shadow: 0 0 20px ${accent}66">
                                <i class="fas fa-play text-white ml-0.5 text-sm"></i>
                            </div>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-2.5 translate-y-1 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-400">
                            <h4 class="font-black text-[9px] md:text-[10px] uppercase italic tracking-tight leading-tight line-clamp-2 mb-1.5">${item.title}</h4>
                            <div class="flex items-center justify-between">
                                <span class="text-[8px] text-yellow-400 font-black">⭐ ${rating}</span>
                                <span class="text-[8px] font-black" style="color:${accent}">${item.year}</span>
                            </div>
                        </div>
                        <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition duration-300">
                            <div class="w-6 h-6 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.1)">
                                <i class="fas fa-info text-[8px] text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                    <div class="mt-2 px-0.5 opacity-0 group-hover:opacity-100 transition duration-300 translate-y-1 group-hover:translate-y-0">
                        <p class="text-[8px] text-gray-500 font-bold line-clamp-1 uppercase italic tracking-tight">${item.title}</p>
                    </div>
                </div>`;
        }

        function scrollCarousel(id, dir) {
            const track = document.getElementById('carousel-' + id);
            if (track) track.scrollBy({ left: dir * (track.clientWidth * 0.75), behavior: 'smooth' });
        }

        async function loadTvChannels() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="flex flex-col items-center justify-center py-24 gap-4">
                <div class="w-12 h-12 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[9px] font-black tracking-[4px] text-gray-600 uppercase">Cargando canales...</p>
            </div>`;
            try {
                const res = await fetch(`/api/tv?lang=${currentLang}`);
                const data = await res.json();
                area.innerHTML = `
                    <div class="px-4 md:px-12 pt-8 pb-6">
                        <div class="flex items-center gap-3 mb-8">
                            <div class="h-10 w-1 rounded-full" style="background: linear-gradient(to bottom, #38bdf8, transparent)"></div>
                            <div>
                                <span class="text-[8px] font-black tracking-[3px] uppercase text-sky-400">TRANSMISIÓN EN DIRECTO</span>
                                <h2 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter">TV En Vivo</h2>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                            ${data.map((ch, i) => `
                                <div class="tv-card cursor-pointer group" data-idx="${i}">
                                    <div class="relative overflow-hidden rounded-xl border border-white/5 shadow-xl" style="aspect-ratio:2/3">
                                        <img src="${ch.poster || ''}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
                                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-400">
                                            <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background: #38bdf8; box-shadow: 0 0 20px #38bdf866">
                                                <i class="fas fa-play text-white ml-0.5 text-sm"></i>
                                            </div>
                                        </div>
                                        <div class="absolute top-2 left-2">
                                            <span class="text-[7px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest" style="background: #38bdf8; color: #000">LIVE</span>
                                        </div>
                                        <div class="absolute bottom-0 left-0 right-0 p-3">
                                            <h3 class="font-black text-xs uppercase italic tracking-tighter leading-tight">${ch.title}</h3>
                                        </div>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>`;
                area.querySelectorAll('.tv-card').forEach((card, i) => {
                    card.onclick = () => openItem(data[i]);
                });
            } catch (err) {
                console.error('TV error:', err);
            }
        }

        async function showSearchResults(category, query) {
            setHeroVisible(false);
            const area = document.getElementById('content-area');
            area.innerHTML = `<div class="flex flex-col items-center justify-center py-24 gap-4">
                <div class="w-12 h-12 border-4 border-sky-400 border-t-transparent rounded-full animate-spin"></div>
            </div>`;
            const apiCategory = category === 'tv' ? 'movies' : category;
            try {
                const res = await fetch(`/api/${apiCategory}/search?query=${encodeURIComponent(query)}&lang=${currentLang}`);
                const data = await res.json();
                if (data.length === 0) {
                    area.innerHTML = `<div class="px-4 md:px-12 pt-8 pb-6 text-center">
                        <p class="text-gray-600 font-black uppercase tracking-widest text-sm">Sin resultados para "${query}"</p>
                    </div>`;
                    return;
                }
                area.innerHTML = `
                    <div class="px-4 md:px-12 pt-8 pb-6">
                        <div class="flex items-center gap-3 mb-7">
                            <div class="h-10 w-1 rounded-full" style="background: linear-gradient(to bottom, #38bdf8, transparent)"></div>
                            <div>
                                <span class="text-[8px] font-black tracking-[3px] uppercase text-sky-400">RESULTADOS DE BÚSQUEDA</span>
                                <h2 class="text-xl md:text-2xl font-black italic uppercase tracking-tighter">"${query}"</h2>
                                <p class="text-[9px] text-gray-600 font-bold">${data.length} títulos encontrados</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-7 xl:grid-cols-8 gap-3 md:gap-4">
                            ${data.map((item, i) => `
                                <div class="search-card cursor-pointer group" data-idx="${i}">
                                    <div class="relative overflow-hidden rounded-xl border border-white/5 shadow-xl" style="aspect-ratio:2/3">
                                        <img src="${item.poster || 'https://placehold.co/300x450/111/222?text=N/A'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-400">
                                            <div class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#38bdf8">
                                                <i class="fas fa-play text-white ml-0.5 text-xs"></i>
                                            </div>
                                        </div>
                                        <div class="absolute bottom-0 left-0 right-0 p-2">
                                            <h4 class="font-black text-[8px] uppercase italic tracking-tight line-clamp-2 mb-1">${item.title}</h4>
                                            <span class="text-[7px] text-sky-400 font-black">${item.year || ''}</span>
                                        </div>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>`;
                area.querySelectorAll('.search-card').forEach((card, i) => {
                    card.onclick = () => openInfoModal(data[i]);
                });
            } catch (err) {
                console.error('Search error:', err);
            }
        }

        async function loadContent(category = 'movies', query = '') {
            currentCategory = category;

            document.querySelectorAll('nav a, div.lg\\:hidden button').forEach(el => {
                const text = el.innerText.toLowerCase();
                if (text.includes(category === 'movies' ? 'cine' : category)) {
                    el.classList.add('text-white'); el.classList.remove('text-gray-400');
                } else {
                    el.classList.remove('text-white'); el.classList.add('text-gray-400');
                }
            });

            const endpoint = query
                ? `/api/${category}/search?query=${query}&lang=${currentLang}`
                : `/api/${category}?lang=${currentLang}`;
            try {
                const res = await fetch(endpoint);
                const data = await res.json();
                const grid = document.getElementById('content-grid');
                grid.innerHTML = '';

                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold uppercase tracking-widest">No se encontraron resultados</div>';
                    return;
                }

                data.forEach((item, index) => {
                    if (!query && index === 0) updateHero(item);
                    const card = document.createElement('div');
                    card.className = 'movie-card relative group cursor-pointer transition-all duration-700';
                    card.onclick = () => openInfoModal(item);
                    card.innerHTML = `
                        <div class="aspect-[2/3] rounded-xl md:rounded-[2rem] overflow-hidden relative border border-white/5 shadow-2xl">
                            <img src="${item.poster || 'https://placehold.co/500x750/000/fff?text=NO+IMAGE'}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-125" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-90"></div>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-500 backdrop-blur-[1px]">
                                <div class="w-10 h-10 md:w-16 md:h-16 bg-sky-400 rounded-full flex items-center justify-center glow-red scale-50 group-hover:scale-100 transition duration-500">
                                    <i class="fas fa-play text-white ml-1 text-sm md:text-xl"></i>
                                </div>
                            </div>
                            <div class="absolute bottom-3 md:bottom-6 left-3 md:left-6 right-3 md:right-6">
                                <h3 class="font-black text-[10px] md:text-sm uppercase italic tracking-tighter leading-none mb-1 md:mb-2 line-clamp-1">${item.title}</h3>
                                <div class="flex items-center gap-2 md:gap-3">
                                    <span class="text-[8px] md:text-[10px] text-sky-400 font-black tracking-widest uppercase">${item.year}</span>
                                    <span class="text-[8px] md:text-[10px] text-yellow-500 font-black">⭐ ${item.rating ? item.rating.toFixed(1) : '0.0'}</span>
                                </div>
                            </div>
                        </div>`;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Error al cargar contenido:", err);
            }
        }

        function updateHero(item) {
            const bg = document.getElementById('hero-bg');
            bg.style.opacity = '0';
            setTimeout(() => { bg.style.backgroundImage = `url('${item.banner}')`; bg.style.opacity = '1'; }, 500);
            document.getElementById('hero-title').innerText = item.title;
            document.getElementById('hero-desc').innerText = item.overview;
            document.getElementById('hero-rating').innerText = `⭐ ${item.rating.toFixed(1)}`;
            document.getElementById('hero-play-btn').onclick = () => openInfoModal(item);
            document.getElementById('hero-info-btn').onclick = () => openInfoModal(item);
        }

        async function openInfoModal(item) {
            if (currentCategory === 'tv') {
                openItem(item);
                return;
            }
            currentItem = item;
            document.body.style.overflow = 'hidden';
            const modal = document.getElementById('info-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            document.getElementById('info-banner').src = item.banner || '';
            document.getElementById('info-poster').src = item.poster || '';
            document.getElementById('info-title').innerText = item.title || '';
            document.getElementById('info-overview').innerText = 'Cargando información...';
            document.getElementById('info-rating-val').innerText = item.rating ? item.rating.toFixed(1) : '';
            document.getElementById('info-genres').innerHTML = '';
            document.getElementById('info-meta').innerHTML = '';
            document.getElementById('info-cast').innerHTML = '';
            document.getElementById('info-director-block').classList.add('hidden');
            document.getElementById('info-cast-block').classList.add('hidden');
            document.getElementById('info-trailer-block').classList.add('hidden');
            document.getElementById('info-trailer-iframe').src = '';

            const endpoint = currentCategory === 'series'
                ? `/api/series/${item.id}/details?lang=${currentLang}`
                : `/api/movies/${item.id}/details?lang=${currentLang}`;

            try {
                const res = await fetch(endpoint);
                const data = await res.json();
                currentItem = data;

                document.getElementById('info-banner').src = data.banner || item.banner || '';
                document.getElementById('info-poster').src = data.poster || item.poster || '';
                document.getElementById('info-title').innerText = data.title || '';
                document.getElementById('info-overview').innerText = data.overview || 'Sin sinopsis disponible.';
                document.getElementById('info-rating-val').innerText = data.rating ? data.rating.toFixed(1) : '';

                const genresEl = document.getElementById('info-genres');
                genresEl.innerHTML = (data.genres || []).map(g => `<span class="info-genre-badge">${g}</span>`).join('');

                const metaEl = document.getElementById('info-meta');
                const chips = [];
                if (data.year) chips.push(`<span class="info-meta-chip"><i class="fas fa-calendar-alt text-sky-400" style="font-size:9px"></i>${data.year}</span>`);
                if (data.runtime) chips.push(`<span class="info-meta-chip"><i class="fas fa-clock text-sky-400" style="font-size:9px"></i>${data.runtime} min</span>`);
                if (data.seasons) chips.push(`<span class="info-meta-chip"><i class="fas fa-layer-group text-sky-400" style="font-size:9px"></i>${data.seasons} temp.</span>`);
                if (data.episodes) chips.push(`<span class="info-meta-chip"><i class="fas fa-play-circle text-sky-400" style="font-size:9px"></i>${data.episodes} ep.</span>`);
                metaEl.innerHTML = chips.join('');

                if (data.director) {
                    document.getElementById('info-director-label').innerText = 'Director';
                    document.getElementById('info-director').innerText = data.director;
                    document.getElementById('info-director-block').classList.remove('hidden');
                } else if (data.creators && data.creators.length > 0) {
                    document.getElementById('info-director-label').innerText = 'Creador';
                    document.getElementById('info-director').innerText = data.creators.join(', ');
                    document.getElementById('info-director-block').classList.remove('hidden');
                }

                if (data.cast && data.cast.length > 0) {
                    document.getElementById('info-cast').innerHTML = data.cast.map(a => `<span class="cast-pill">${a}</span>`).join('');
                    document.getElementById('info-cast-block').classList.remove('hidden');
                }

                if (data.trailerKey) {
                    document.getElementById('info-trailer-iframe').src = `https://www.youtube.com/embed/${data.trailerKey}?rel=0&modestbranding=1`;
                    document.getElementById('info-trailer-block').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('info-overview').innerText = item.overview || 'Sin sinopsis disponible.';
                console.error('Error fetching details:', err);
            }
        }

        function closeInfoModal() {
            const modal = document.getElementById('info-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
            document.getElementById('info-trailer-iframe').src = '';
            document.getElementById('info-trailer-block').classList.add('hidden');
        }

        function playFromInfoModal() {
            closeInfoModal();
            openItem(currentItem);
        }

        async function openItem(item) {
            currentItem = item;
            currentAudioType = 'latino';
            document.getElementById('player-title').innerText = item.title;
            document.getElementById('player-view').classList.remove('hidden');
            document.getElementById('player-loader').classList.remove('hidden');
            document.getElementById('video-frame').src = '';
            document.body.style.overflow = 'hidden';

            const episodesBtn = document.getElementById('toggle-episodes-btn');
            const episodesDrawer = document.getElementById('episodes-drawer');
            const audioRow = document.getElementById('audio-selector-row');

            if (currentCategory === 'tv') {
                episodesBtn.classList.add('hidden');
                episodesDrawer.classList.add('hidden');
                audioRow.classList.add('hidden');
                document.getElementById('server-tabs').innerHTML = `
                    <button class="flex-shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest bg-sky-400 text-white border-2 border-sky-400">
                        📺 EN VIVO <span class="text-[8px] bg-white/20 px-1.5 py-0.5 rounded">LIVE</span>
                    </button>`;
                playFromServer(item.embeds.vip);
            } else if (currentCategory === 'series') {
                episodesBtn.classList.remove('hidden');
                episodesDrawer.classList.remove('hidden');
                audioRow.classList.remove('hidden');
                currentSeriesId = item.id;
                await loadSeriesDetails(item.id);
            } else {
                episodesBtn.classList.add('hidden');
                episodesDrawer.classList.add('hidden');
                audioRow.classList.remove('hidden');
                currentEmbeds = item.embeds;
                renderAudioButtons('latino');
                renderServerTabs(currentEmbeds.latino, 0);
            }

            document.getElementById('video-frame').onload = () =>
                document.getElementById('player-loader').classList.add('hidden');
        }

        function setAudioType(type) {
            currentAudioType = type;
            renderAudioButtons(type);
            if (currentEmbeds) {
                renderServerTabs(currentEmbeds[type], 0);
            }
        }

        function renderAudioButtons(active) {
            const activeClass = 'flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-sky-400 text-white border-2 border-sky-400';
            const inactiveClass = 'flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all bg-white/5 text-gray-300 border-2 border-white/10 hover:border-sky-400/50';
            document.getElementById('btn-latino').className = active === 'latino' ? activeClass : inactiveClass;
            document.getElementById('btn-castellano').className = active === 'castellano' ? activeClass : inactiveClass;
        }

        function renderServerTabs(servers, activeIdx) {
            const tabs = document.getElementById('server-tabs');
            tabs.innerHTML = servers.map((s, i) => `
                <button id="tab-${i}" onclick="selectServerTab(${i})"
                    class="flex-shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 ${i === activeIdx ? 'bg-sky-400 text-white border-sky-400' : 'bg-white/5 text-gray-300 border-white/10 hover:border-sky-400/50'}">
                    ${s.name}
                    <span class="text-[8px] ${i === activeIdx ? 'bg-white/20' : 'bg-white/10'} px-1.5 py-0.5 rounded">${s.quality}</span>
                </button>
            `).join('');
            playFromServer(servers[activeIdx].url);
        }

        function selectServerTab(idx) {
            const servers = currentEmbeds[currentAudioType];
            document.querySelectorAll('#server-tabs button').forEach((btn, i) => {
                btn.className = `flex-shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 ${i === idx ? 'bg-sky-400 text-white border-sky-400' : 'bg-white/5 text-gray-300 border-white/10 hover:border-sky-400/50'}`;
                const badge = btn.querySelector('span');
                if (badge) badge.className = `text-[8px] ${i === idx ? 'bg-white/20' : 'bg-white/10'} px-1.5 py-0.5 rounded`;
            });
            playFromServer(servers[idx].url);
        }

        function playFromServer(url) {
            const frame = document.getElementById('video-frame');
            const loader = document.getElementById('player-loader');
            frame.src = 'about:blank';
            loader.classList.remove('hidden');
            setTimeout(() => { frame.src = url; }, 300);
        }

        function toggleEpisodesDrawer() {
            document.getElementById('episodes-drawer').classList.toggle('hidden');
        }

        async function loadSeriesDetails(id) {
            const res = await fetch(`/api/series/${id}`);
            const data = await res.json();
            const seasonSelect = document.getElementById('season-select');
            seasonSelect.innerHTML = data.seasons
                .filter(s => s.number > 0)
                .map(s => `<option value="${s.number}">${s.name}</option>`).join('');
            seasonSelect.onchange = (e) => {
                const season = data.seasons.find(s => s.number == e.target.value);
                loadEpisodes(id, season.number, season.episodes);
            };
            const first = data.seasons.find(s => s.number > 0) || data.seasons[0];
            loadEpisodes(id, first.number, first.episodes);
        }

        function loadEpisodes(seriesId, seasonNum, episodeCount) {
            currentSeason = seasonNum;
            const list = document.getElementById('episode-list');
            list.innerHTML = '';
            for (let i = 1; i <= episodeCount; i++) {
                const btn = document.createElement('button');
                btn.className = 'episode-card p-2 rounded-lg border border-white/10 bg-white/5 text-center transition hover:border-sky-400 hover:bg-sky-400/10';
                btn.innerHTML = `<span class="text-[9px] font-black uppercase tracking-widest block">EP ${i}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.episode-card').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    playEpisode(seriesId, seasonNum, i);
                };
                list.appendChild(btn);
            }
            playEpisode(seriesId, seasonNum, 1);
        }

        async function playEpisode(id, s, e) {
            currentEpisode = e;
            document.getElementById('video-frame').src = 'about:blank';
            document.getElementById('player-loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/series/${id}/episode?s=${s}&e=${e}&lang=${currentLang}`);
                const data = await res.json();
                currentEmbeds = data;
                renderAudioButtons(currentAudioType);
                renderServerTabs(currentEmbeds[currentAudioType], 0);
                document.getElementById('video-frame').onload = () =>
                    document.getElementById('player-loader').classList.add('hidden');
            } catch (err) {
                console.error("Error al reproducir episodio:", err);
            }
        }

        function closePlayer() {
            document.getElementById('player-view').classList.add('hidden');
            document.getElementById('video-frame').src = '';
            document.body.style.overflow = 'auto';
            currentEmbeds = null;
        }

        let searchTimeout;
        document.getElementById('global-search').oninput = (e) => {
            clearTimeout(searchTimeout);
            const val = e.target.value.trim();
            searchTimeout = setTimeout(() => {
                if (val.length > 2) showSearchResults(currentCategory, val);
                else if (val.length === 0) {
                    if (currentCategory === 'tv') { setHeroVisible(false); loadTvChannels(); }
                    else { setHeroVisible(true); loadAndRenderCategories(currentCategory); }
                }
            }, 600);
        };

        loadCategory('movies');
    </script>
</body>
